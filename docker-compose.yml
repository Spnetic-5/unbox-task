services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: unbox
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d unbox"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@db:5432/unbox
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  simulator:
    build:
      context: ./backend
    environment:
      API_BASE_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_started
    command: ["npm", "run", "simulate"]

  frontend:
    build:
      context: ./frontend
    environment:
      REACT_APP_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata:

